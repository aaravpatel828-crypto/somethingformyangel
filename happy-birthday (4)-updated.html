<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500&family=Karla:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFE3EE;
    --card: #FFF5FA;
    --ink: #5A2A44;
    --coral: #E8547E;
    --gold: #E3B23C;
    --rose: #FF8FB1;
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Karla', sans-serif;
    overflow-x: hidden;
  }

  h1,h2,.display{
    font-family: 'Fraunces', serif;
  }

  .eyebrow{
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--coral);
  }

  /* ---------- floating hearts ambience ---------- */
  .hearts{
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .heart{
    position: absolute;
    bottom: -10%;
    font-size: 1.5rem;
    opacity: 0.5;
    animation: floatUp linear infinite;
    color: var(--coral);
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) rotate(0deg); opacity: 0; }
    10%{ opacity: 0.55; }
    90%{ opacity: 0.55; }
    100%{ transform: translateY(-110vh) rotate(25deg); opacity: 0; }
  }

  /* ---------- hero ---------- */
  .hero{
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    z-index: 1;
  }
  .hero h1{
    font-size: clamp(2.6rem, 8vw, 5.2rem);
    font-weight: 600;
    margin: 0.4rem 0 0.2rem;
    line-height: 1.05;
  }
  .hero .name{
    color: var(--coral);
    font-style: italic;
    font-weight: 500;
  }
  .hero p{
    max-width: 34ch;
    font-size: 1.05rem;
    opacity: 0.85;
    margin: 0.8rem 0 2.2rem;
  }
  .scroll-btn{
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.85rem 1.6rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease, transform 0.2s ease;
  }
  .scroll-btn:hover{
    background: var(--ink);
    color: var(--bg);
    transform: translateY(-2px);
  }
  .scroll-btn:focus-visible, button:focus-visible, .polaroid:focus-visible{
    outline: 2px solid var(--coral);
    outline-offset: 3px;
  }

  section{
    position: relative;
    z-index: 1;
    padding: 5rem 1.5rem;
  }
  .section-head{
    text-align: center;
    max-width: 40ch;
    margin: 0 auto 3rem;
  }
  .section-head h2{
    font-size: clamp(1.8rem, 4.5vw, 2.6rem);
    font-weight: 600;
    margin: 0.4rem 0;
  }

  /* ---------- memory string ---------- */
  .string-wrap{
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
  }
  .string-line{
    position: absolute;
    top: 18px;
    left: 0;
    right: 0;
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 6px, transparent 6px 10px);
    opacity: 0.4;
  }
  .polaroids{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2.4rem 1.6rem;
    padding-top: 2.4rem;
  }
  .polaroid{
    background: var(--card);
    width: 190px;
    padding: 12px 12px 38px;
    border-radius: 3px;
    box-shadow: 0 10px 24px rgba(74,46,58,0.14);
    cursor: default;
    transform: rotate(var(--tilt, -3deg));
    transition: transform 0.35s ease, box-shadow 0.35s ease;
    perspective: 800px;
    border: none;
    text-align: left;
    font-family: inherit;
  }
  .polaroid:hover{
    transform: rotate(0deg) translateY(-6px) scale(1.03);
    box-shadow: 0 16px 30px rgba(74,46,58,0.2);
  }
  .polaroid:nth-child(2n){ --tilt: 2.5deg; }
  .polaroid:nth-child(3n){ --tilt: -1.5deg; }
  .polaroid:nth-child(4n){ --tilt: 3.5deg; }
  .pin{
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.1rem;
  }
  .photo-face{
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    border-radius: 2px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--rose), var(--gold));
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-face img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-placeholder{
    color: rgba(255,255,255,0.9);
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    text-align: center;
    padding: 0.6rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .caption{
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    text-align: center;
    padding-top: 10px;
    color: var(--ink);
    opacity: 0.75;
  }
  .flip-hint{
    text-align: center;
    font-size: 0.62rem;
    opacity: 0.45;
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
  }

  /* flip modal note */
  .note-overlay{
    position: fixed;
    inset: 0;
    background: rgba(74,46,58,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .note-overlay.active{
    opacity: 1;
    pointer-events: auto;
  }
  .note-card{
    background: var(--card);
    max-width: 380px;
    width: 100%;
    padding: 2.2rem 1.8rem;
    border-radius: 10px;
    text-align: center;
    transform: scale(0.9) translateY(10px);
    transition: transform 0.3s ease;
  }
  .note-overlay.active .note-card{
    transform: scale(1) translateY(0);
  }
  .note-card p{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.2rem;
    line-height: 1.5;
    margin: 0.6rem 0 1.4rem;
  }
  .note-close{
    border: none;
    background: var(--ink);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.6rem 1.3rem;
    border-radius: 999px;
    cursor: pointer;
  }

  /* ---------- reasons deck ---------- */
  .deck-wrap{
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }
  .deck-card{
    position: relative;
    width: 100%;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 12px 28px rgba(90,42,68,0.16);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.2rem;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 1.25rem;
    font-weight: 500;
    line-height: 1.4;
  }
  .deck-card.single-note{
    max-width: 560px;
    margin: 0 auto;
    text-align: left;
    white-space: pre-line;
    font-size: 1.08rem;
    line-height: 1.7;
    padding: 2.6rem 2.2rem;
  }
  .deck-controls{
    display: flex;
    align-items: center;
    gap: 1.4rem;
  }
  .deck-btn{
    border: 1.5px solid var(--ink);
    background: transparent;
    color: var(--ink);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s ease, color 0.25s ease;
  }
  .deck-btn:hover{ background: var(--ink); color: var(--bg); }
  .deck-count{
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    opacity: 0.6;
  }

  /* ---------- finale ---------- */
  .finale{
    text-align: center;
    padding-bottom: 8rem;
  }
  .finale-box{
    max-width: 480px;
    margin: 0 auto;
    background: var(--card);
    border-radius: 18px;
    padding: 3rem 2rem;
    box-shadow: 0 16px 36px rgba(74,46,58,0.14);
  }
  .cake-btn{
    font-size: 3.2rem;
    background: none;
    border: none;
    cursor: pointer;
    transition: transform 0.25s ease;
    line-height: 1;
  }
  .cake-btn:hover{ transform: scale(1.12) rotate(-4deg); }
  .finale-msg{
    font-family: 'Fraunces', serif;
    font-size: 1.35rem;
    font-style: italic;
    margin-top: 1.4rem;
    line-height: 1.5;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.6s ease;
  }
  .finale-msg.show{
    opacity: 1;
    max-height: 400px;
    margin-top: 1.4rem;
  }
  .signoff{
    margin-top: 3rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    opacity: 0.5;
  }

  canvas#confetti{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 40;
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    .heart{ animation: none; display: none; }
    *{ transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>
<canvas id="confetti"></canvas>

<!-- ================= HERO ================= -->
<section class="hero">
  <p class="eyebrow" id="eyebrow-date">a little something for you</p>
  <h1>Happy Birthday,<br><span class="name" id="hero-name">Love</span></h1>
  <p id="hero-sub">I made you a tiny corner of the internet just because. Scroll down — there's a surprise or two.</p>
  <button class="scroll-btn" onclick="document.getElementById('memories').scrollIntoView()">scroll below for moree babydollllll ↓</button>
</section>

<!-- ================= MEMORY STRING ================= -->
<section id="memories">
  <div class="section-head">
    <h2>A few of my favorites</h2>
  </div>
  <div class="string-wrap">
    <div class="string-line"></div>
    <div class="polaroids" id="polaroid-container"></div>
  </div>
</section>

<!-- ================= NOTE SECTION ================= -->
<section>
  <div class="section-head">
    <h2>a little note from me</h2>
  </div>
  <div class="deck-wrap">
    <div class="deck-card single-note" id="single-note"></div>
  </div>
</section>

<!-- ================= FINALE ================= -->
<section class="finale">
  <div class="finale-box">
    <p class="eyebrow">last thing, I promise</p>
    <h2 style="margin: 0.4rem 0 1.6rem;">One tap left</h2>
    <button class="cake-btn" id="cake-btn" aria-label="Celebrate">🎂</button>
    <div class="finale-msg" id="finale-msg"></div>
  </div>
  <p class="signoff" id="signoff"></p>
</section>

/* ============================================================ */

document.getElementById('hero-name').textContent = CONFIG.name;
document.getElementById('hero-sub').textContent = CONFIG.subMessage;
document.getElementById('signoff').textContent = CONFIG.signoff;

// ---- floating hearts ----
const heartsWrap = document.getElementById('hearts');
const heartChars = ['♥','❤','♡'];
for(let i=0;i<24;i++){
  const h = document.createElement('span');
  h.className = 'heart';
  h.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
  h.style.left = Math.random()*100 + 'vw';
  h.style.animationDuration = (10 + Math.random()*10) + 's';
  h.style.animationDelay = (Math.random()*10) + 's';
  h.style.fontSize = (1 + Math.random()*1.2) + 'rem';
  heartsWrap.appendChild(h);
}

// ---- polaroids ----
const polaroidContainer = document.getElementById('polaroid-container');
CONFIG.photos.forEach((photo, i) => {
  const card = document.createElement('button');
  card.className = 'polaroid';
  card.type = 'button';
  card.innerHTML = `
    <span class="pin">📌</span>
    <span class="photo-face">
      ${photo.src ? `<img src="${photo.src}" alt="${photo.caption}">` : `<span class="photo-placeholder">add photo<br>${photo.caption}</span>`}
    </span>
    <span class="caption">${photo.caption}</span>
  `;
  polaroidContainer.appendChild(card);
});

// ---- single note ----
document.getElementById('single-note').textContent = CONFIG.note;

// ---- finale + confetti ----
const cakeBtn = document.getElementById('cake-btn');
const finaleMsg = document.getElementById('finale-msg');
let celebrated = false;

cakeBtn.addEventListener('click', () => {
  finaleMsg.textContent = CONFIG.finalMessage;
  finaleMsg.classList.add('show');
  if(!celebrated){
    launchConfetti();
    celebrated = true;
  }
});

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function launchConfetti(){
  if(reduceMotion) return;
  const colors = ['#E8746A', '#E3B23C', '#F2A0A1', '#4A2E3A', '#FFFBF6'];
  const particles = Array.from({length: 140}, () => ({
    x: canvas.width/2,
    y: canvas.height/2,
    vx: (Math.random()-0.5) * 14,
    vy: (Math.random()-1.4) * 14,
    size: 4 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    rotation: Math.random()*360,
    rotSpeed: (Math.random()-0.5)*10,
    gravity: 0.28 + Math.random()*0.12,
    life: 0
  }));
  let frame = 0;
  function animate(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    particles.forEach(p => {
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      p.life++;
      if(p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
    });
    if(alive && frame < 240){
      requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  animate();
}
